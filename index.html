<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Stack 📚</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="title-container">
                <div style="width: 24px;"><div class="logo-bar" style="width: 100%;"></div><div class="logo-bar" style="width: 60%;"></div><div class="logo-bar" style="width: 85%;"></div></div>
                <h1 class="title">Book Stack<span>.</span></h1>
            </div>
            <div class="header-buttons">
                <span id="syncStatus">인증 대기 중...</span>
                <button id="loginBtn" class="btn btn-new-stack" onclick="handleLogin()">Login with Google</button>
                <button id="logoutBtn" class="btn" style="display:none;" onclick="handleLogout()">Logout</button>
                <button class="btn btn-new-stack" onclick="addShelf()">New Stack</button>
            </div>
        </header>

        <section id="mainContent" style="display:none;">
            <section class="hero-section">
                <div class="hero-text">
                    <h2>Book Stack 📚</h2>
                    <div class="search-box">
                        <input type="text" id="kwInput" placeholder="새로운 책 검색 및 추가..." onkeypress="if(event.keyCode==13) searchByKeyword()">
                        <span class="clear-btn" onclick="clearSearch()">✕</span>
                        <span style="cursor:pointer; opacity:0.7;" onclick="searchByKeyword()">🔍</span>
                    </div>
                </div>
                <div id="searchResults" class="search-results"></div>
            </section>

            <div class="stats-container collapsed" id="statsBar" onclick="toggleStats(event)">
                <div class="stats-header">
                    <span class="stats-title">STACKS</span>
                    <button class="stats-toggle-btn" id="toggleBtn">펼치기</button>
                </div>
                <div class="stats-expand-area">
                    <div class="stats-content-layout">
                        <div class="total-box"><span class="total-num" id="totalCount">0</span><span class="total-lbl">TOTAL</span></div>
                        <div class="stats-shelf-list" id="statsShelfList"></div>
                    </div>
                </div>
            </div>

            <div id="shelfList"></div>
        </section>
        
        <section id="loginMessage" style="text-align:center; padding:100px 0;">
            <p style="color:var(--text-sub); letter-spacing:0.1em;">로그인 후 당신만의 서재를 가꾸어보세요. ✨</p>
        </section>
    </div>

    <button class="help-fab" onclick="toggleGuide(true)">❔</button>

    <div id="guideModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;" onclick="toggleGuide(false)">
        <div style="background:#111; padding:40px; border-radius:20px; border:1px solid var(--accent); max-width:500px;" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:20px;">Guide</h3>
            <p style="color:#ccc; line-height:1.6;">구글 로그인 후 책을 검색하여 추가하세요. 드래그로 순서를 바꿀 수 있으며, 클라우드에 자동 저장됩니다.</p>
            <button class="btn" style="margin-top:20px;" onclick="toggleGuide(false)">닫기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
